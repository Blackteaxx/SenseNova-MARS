# WSI DICOM tool configuration for training.

tools:
  - class_name: verl.tools.wsi_zoom_in_tool.WSIZoomInTool
    config:
      type: native
      relative_coord_max: 1000.0
      crop_long_side: 1024
    tool_schema:
      type: function
      function:
        name: wsi_zoom_in_tool
        description: "Zoom into a region of the current WSI view using the shared global-relative 0..1000 coordinate system."
        parameters:
          type: object
          additionalProperties: false
          properties:
            bbox_2d:
              type: array
              items:
                type: number
              minItems: 4
              maxItems: 4
              description: "[x1, y1, x2, y2] crop box in 0..1000 space."
            label:
              type: string
              description: "Short label for the crop request."
          required:
            - bbox_2d
            - label
